name: "raibecas-dev"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: raibecas
      POSTGRES_USER: raibecas
      POSTGRES_PASSWORD: raibecas_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U raibecas" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    command:
      - "-js"
      - "-sd=/data"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider --timeout=5 http://localhost:9090/-/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "6831:6831/udp" # Jaeger agent
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      QUERY_CLOCK_SKEW_ADJUSTMENT: "true"
      QUERY_MAX_CLOCK_SKEW_ADJUSTMENT: "500ms"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --timeout=5 http://localhost:16686 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  auth-service:
    build:
      context: ../
      dockerfile: services/auth/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: raibecas
      DB_PASSWORD: raibecas_dev
      DB_NAME: raibecas
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NATS_URL: nats://nats:4222
      NATS_CONNECTION_NAME: auth-service
      JWT_SECRET: dev_secret_change_in_production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      TELEMETRY_ENABLED: "true"
      TELEMETRY_SERVICE_NAME: auth-service
      TELEMETRY_SERVICE_VERSION: "1.0.0"
      TELEMETRY_OTLP_ENDPOINT: jaeger:4318
      TELEMETRY_EXPORT_TIMEOUT: 30s
      TELEMETRY_BATCH_TIMEOUT: 5s
      TELEMETRY_MAX_QUEUE_SIZE: 2048
      TELEMETRY_MAX_EXPORT_BATCH: 512
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nats_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
